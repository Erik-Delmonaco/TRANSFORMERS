<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Vocab Lookup</title>
	<link rel="stylesheet" href="style.css" />
</head>
<body>
	<main class="page">
		<header class="hero">
			<h1>Vocab Lookup</h1>
			<p>Character to index to vector mapping from <code>/vocab</code></p>
		</header>

		<section class="layout">
			<article class="card lookup-card">
				<h2>Lookup Table</h2>
				<p class="hint">Vertical vocab list with token -&gt; index -&gt; vector</p>
				<div id="lookup-table" class="lookup-table" aria-live="polite"></div>
			</article>

			<article class="card plot-card">
				<h2>Vector Plot</h2>
				<p class="hint">2D embeddings from your endpoint</p>
				<canvas id="vector-canvas" width="760" height="520" aria-label="Vector plot" role="img"></canvas>
				<p id="plot-status" class="plot-status"></p>
			</article>
		</section>
	</main>

	<script src="script.js" defer></script>
</body>
</html>
